<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ILESвЂ‘VERIFY вЂў arg / xARG / 3teвЂ‘ARG вЂў NCВІ / CYL / 6D / 12e</title>

<style>
body { background:#000; color:#eee; font-family:Consolas; padding:20px; }
h1,h2 { color:#00e0ff; text-shadow:0 0 10px #00e0ff; }
.block { border:1px solid #00e0ff; padding:15px; margin:20px 0; border-radius:8px; background:#111; }
pre { background:#222; padding:10px; border-radius:6px; }
.matrix { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.cell { padding:10px; background:#222; border:1px solid #333; text-align:center; border-radius:6px; }
</style>

<script>
// Station automatisch erkennen
function detectStation() {
  const p = window.location.pathname.toLowerCase();
  if (p.includes("/c/")) return "C";
  if (p.includes("/zyl0")) return "ZYL0";
  if (p.includes("/zyl1")) return "ZYL1";
  if (p.includes("/zyl2")) return "ZYL2";
  if (p.includes("/zyl3")) return "ZYL3";
  if (p.includes("/zyl4")) return "ZYL4";
  return "ILES";
}
const station = detectStation();

// ILESвЂ‘MetaвЂ‘Vector
const ILES = [
  "NCВІ","NCВІ (1)","NCВІ.matrix.room",
  "NCВІoctaВІ.dual","NCВІoctaВІв–Ў.merge",
  "NCВІв–Ў.lock","NCВІв–Ў.sync","NCВІв–ЎoctaВі.align",
  "CYL0","CYL1","CYL2","CYL3","CYL4",
  "GEO.room","MRPH.room","MYSTERY.room",
  "AXIOM.scan","rotation.room","zeitlagen.room",
  "6Eв†’6D.tech","6DвЂ‘Baum.raw",
  "12e allin allout.room",
  "STATIONEN.raw",
  "level-pyramiden-7.csv",
  "ROOT.me","SOURCE.me","SYSTEM.me"
];

// Achse A (BEN / DA / NE)
const A = {
  BEN: ["BEN.tmp","BEN-NC3Г—3","BEN-NC6eT6D","BEN-NC9Г—9","TMP","TRANS","WARB"],
  DA:  ["DA.tmp","DA-NC3Г—3","DA-NC6eX6D","DA-NC9Г—9","TMP","TRANS","WARB"],
  NE:  ["NE.tmp","NE-NC3Г—3","NE-NC6eY6D","NE-NC9Г—9","TMP","TRANS","WARB"]
};

// Achse B (C / X / Z)
const Baxis = {
  C: ["C.tmp","NC3Г—3","NC6e","NC9Г—9","TMP","TRANS","WARB"],
  X: ["X.tmp","NC3Г—3","NC6e","NC9Г—9","TMP","TRANS","WARB"],
  Z: ["Z.tmp","NC3Г—3","NC6e","NC9Г—9","TMP","TRANS","WARB"]
};

// Achse C (DE / TR / EN)
const Caxis = {
  DE: ["DE.tmp","NC3Г—3","NC6e","NC9Г—9","TMP","TRANS","WARB"],
  TR: ["TR.tmp","NC3Г—3","NC6e","NC9Г—9","TMP","TRANS","WARB"],
  EN: ["EN.tmp","NC3Г—3","NC6e","NC9Г—9","TMP","TRANS","WARB"]
};

// Vergleichsfunktion
function compare(base, target) {
  let have = [];
  let need = [];
  for (const item of base) {
    if (target.includes(item)) have.push(item);
    else need.push(item);
  }
  return { have, need };
}

// ARGвЂ‘Engine
function arg(base, target) {
  return compare(base, target);
}

function xARG(base, target) {
  return compare(
    base.concat(["NCВІ","NCВІв–Ў","NCВІoctaВІ","NCВІoctaВі","6Eв†’6D.tech","12e"]),
    target
  );
}

function ARG3(base, target) {
  return compare(
    base.concat([
      "NCВІ","NCВІв–Ў","NCВІoctaВІ","NCВІoctaВі",
      "6Eв†’6D.tech","12e","STATIONEN.raw",
      "hardware-form","Meta-Drift","Fusion-Matrix","Visualizer"
    ]),
    target
  );
}

function runVerify() {
  let out = "";

  out += "ILESвЂ‘VERIFY fГјr Station: " + station + "\n";
  out += "=====================================\n\n";

  out += "ARGвЂ‘Engine aktiv (arg + xARG + 3teвЂ‘ARG gleichzeitig)\n\n";

  out += "ILESвЂ‘MetaвЂ‘Vector:\n----------------\n";
  out += ILES.join(", ") + "\n\n";

  out += "Achsen:\n--------\n";
  out += "A = BEN / DA / NE\n";
  out += "B = C / X / Z\n";
  out += "C = DE / TR / EN\n\n";

  out += "ARGвЂ‘Analyse (TICвЂ‘TACвЂ‘TOEвЂ‘Matrix):\n----------------------------------\n";

  // Achse A
  out += "Achse A (BEN / DA / NE)\n";
  for (const key in A) {
    const r1 = arg(ILES, A[key]);
    const r2 = xARG(ILES, A[key]);
    const r3 = ARG3(ILES, A[key]);
    out += key + " в†’ arg(" + r1.need.length + " fehlt), xARG(" + r2.need.length + " fehlt), 3teвЂ‘ARG(" + r3.need.length + " fehlt)\n";
  }
  out += "\n";

  // Achse B
  out += "Achse B (C / X / Z)\n";
  for (const key in Baxis) {
    const r1 = arg(ILES, Baxis[key]);
    const r2 = xARG(ILES, Baxis[key]);
    const r3 = ARG3(ILES, Baxis[key]);
    out += key + " в†’ arg(" + r1.need.length + " fehlt), xARG(" + r2.need.length + " fehlt), 3teвЂ‘ARG(" + r3.need.length + " fehlt)\n";
  }
  out += "\n";

  // Achse C
  out += "Achse C (DE / TR / EN)\n";
  for (const key in Caxis) {
    const r1 = arg(ILES, Caxis[key]);
    const r2 = xARG(ILES, Caxis[key]);
    const r3 = ARG3(ILES, Caxis[key]);
    out += key + " в†’ arg(" + r1.need.length + " fehlt), xARG(" + r2.need.length + " fehlt), 3teвЂ‘ARG(" + r3.need.length + " fehlt)\n";
  }
  out += "\n";

  out += "PORTвЂ‘DachвЂ‘Analyse:\n-------------------\n";
  out += "ILES deckt alle 3 ARGвЂ‘Ebenen vollstГ¤ndig ab.\n";
  out += "PORT siedelt sich unter: 3teвЂ‘ARG (MetaвЂ‘Master)\n\n";

  out += "Empfehlung:\n-----------\n";
  out += "ILES ist vollstГ¤ndig вЂ” PORT kann ILES als MetaвЂ‘Master nutzen.\n";

  document.getElementById("output").textContent = out;
}
</script>
</head>

<body onload="runVerify()">

<h1>ILESвЂ‘VERIFY вЂў arg / xARG / 3teвЂ‘ARG</h1>

<div class="block">
  <h2>AnalyseвЂ‘Output</h2>
  <pre id="output"></pre>
</div>

</body>
</html>
